<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <filter id="leather-grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.62 0.78" numOctaves="9" seed="7" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix"
        values="0.22 0.05 0.01 0 0.05
                0.07 0.02 0.005 0 0.01
                0.01 0.003 0.001 0 0
                0    0    0    1 0"
        in="noise" result="tinted"/>
      <feComposite in="SourceGraphic" in2="tinted" operator="arithmetic" k1="0" k2="1" k3="0.55" k4="0"/>
    </filter>
    <filter id="leather-crease" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.02 0.04" numOctaves="4" seed="12" stitchTiles="stitch" result="crease"/>
      <feDisplacementMap in="SourceGraphic" in2="crease" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Base leather colour -->
  <rect width="512" height="512" fill="#3B1508"/>
  <!-- Mid-tone variation layer -->
  <rect width="512" height="512" fill="#4E1D0A" filter="url(#leather-crease)" opacity="0.6"/>
  <!-- Grain texture -->
  <rect width="512" height="512" fill="#5C2410" filter="url(#leather-grain)" opacity="0.85"/>
  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(10,3,0,0.55)"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#vignette)"/>
</svg>
